<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0f3460;
        }

        header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 0.25rem;
        }

        .message.error {
            align-self: center;
            background: #ff6b6b;
            color: white;
        }

        #input-container {
            background: #16213e;
            padding: 1rem 2rem;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 1rem;
        }

        #message-input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #0f3460;
            border-radius: 0.5rem;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            resize: none;
        }

        #message-input:focus {
            outline: none;
            border-color: #e94560;
        }

        #send-btn, #clear-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn {
            background: #e94560;
            color: white;
        }

        #send-btn:hover {
            background: #ff6b6b;
        }

        #send-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        #clear-btn {
            background: #0f3460;
            color: #eee;
        }

        #clear-btn:hover {
            background: #1a4a7a;
        }

        .typing-indicator {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #16213e;
            border-radius: 1rem;
            font-style: italic;
            color: #888;
        }

        .typing-indicator::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        #char-count {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.25rem;
        }

        #char-count.warning {
            color: #f59e0b;
        }

        #char-count.error {
            color: #ef4444;
        }

        /* Markdown-like styling for code blocks */
        .message.assistant pre {
            background: #0d1117;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message.assistant code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message.assistant p {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Claude Chat</h1>
    </header>

    <div id="chat-container">
        <div class="message assistant">
            Hello! I'm Claude. How can I help you today?
        </div>
    </div>

    <div id="input-container">
        <div style="flex: 1;">
            <textarea
                id="message-input"
                placeholder="Type your message..."
                rows="1"
            ></textarea>
            <div id="char-count">0 / 4000 characters</div>
        </div>
        <button id="send-btn">Send</button>
        <button id="clear-btn">Clear</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');

        let conversationHistory = [];
        let isLoading = false;
        const MAX_CHARS = 4000;

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function updateMessage(messageDiv, content) {
            messageDiv.textContent = content;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Validate message length
            if (message.length > MAX_CHARS) {
                addMessage(`Message too long! Please keep it under ${MAX_CHARS} characters.`, 'error');
                return;
            }

            isLoading = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            updateCharCount();

            // Add user message to UI
            addMessage(message, 'user');

            // Create placeholder for assistant response with typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.textContent = 'Claude is typing';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_history: conversationHistory,
                        max_tokens: 1024
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Remove typing indicator
                typingDiv.remove();

                // Create assistant message placeholder
                const assistantMessage = addMessage('', 'assistant');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                break;
                            }
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    fullResponse += parsed.content;
                                    updateMessage(assistantMessage, fullResponse);
                                }
                            } catch (e) {
                                // Ignore parse errors for partial JSON
                            }
                        }
                    }
                }

                // Update conversation history (only keep last 10 messages for context window)
                conversationHistory.push({ role: 'user', content: message });
                conversationHistory.push({ role: 'assistant', content: fullResponse });
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }

            } catch (error) {
                typingDiv.remove();
                const errorMessage = addMessage(`Error: ${error.message}`, 'error');
                conversationHistory = []; // Clear history on error
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function clearChat() {
            conversationHistory = [];
            chatContainer.innerHTML = '<div class="message assistant">Chat cleared. How can I help you?</div>';
            updateCharCount();
            messageInput.focus();
        }

        function updateCharCount() {
            const charCount = document.getElementById('char-count');
            const length = messageInput.value.length;
            charCount.textContent = `${length} / ${MAX_CHARS} characters`;

            if (length > MAX_CHARS) {
                charCount.className = 'error';
            } else if (length > MAX_CHARS * 0.8) {
                charCount.className = 'warning';
            } else {
                charCount.className = '';
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', clearChat);

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            updateCharCount();
        });

        // Initialize char count
        updateCharCount();
    </script>
</body>
</html>
